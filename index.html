<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Neduka v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .input-cinematic { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.2); color: white; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; }
        .hidden { display: none !important; }
        table th { background: rgba(56, 189, 248, 0.1); color: #38bdf8; font-size: 10px; text-transform: uppercase; padding: 12px 8px; border: 1px solid rgba(255,255,255,0.1); }
        table td { border: 1px solid rgba(255,255,255,0.05); padding: 0; }
        .editable-cell { background: transparent; color: white; width: 100%; height: 100%; padding: 10px 5px; text-align: center; font-size: 12px; border: none; outline: none; }
        .editable-cell:focus { background: rgba(56, 189, 248, 0.15); box-shadow: inset 0 0 5px #38bdf8; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .bg-online { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .bg-offline { background: #fb7185; }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen">
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 glass p-4 rounded-2xl hidden z-[100] text-sm font-bold border-sky-500 border text-center min-w-[280px]"></div>

    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <img src="logo.png" class="w-20 mx-auto mb-6" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2602/2602414.png'">
            <h1 class="font-bold text-xl uppercase">SMPN 2 KAWALI</h1>
            <p class="text-slate-400 text-[10px] mb-8 tracking-widest uppercase">Admin Panel v3.0</p>
            <div class="space-y-4">
                <input id="u" class="input-cinematic w-full p-4 rounded-2xl text-center" placeholder="USERNAME">
                <input id="pin" type="password" class="input-cinematic w-full p-4 rounded-2xl text-center tracking-[0.5em]" placeholder="PIN">
                <button onclick="login()" class="w-full bg-sky-600 hover:bg-sky-500 p-4 rounded-2xl font-bold text-white transition-all">MASUK</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-6xl mx-auto">
        <nav class="flex justify-between items-center glass p-4 rounded-3xl mb-6 px-6">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="w-6" onerror="this.style.display='none'">
                <span id="roleLabel" class="text-[10px] font-bold bg-sky-500/20 text-sky-400 px-3 py-1 rounded-full uppercase"></span>
            </div>
            <div class="flex gap-4 text-[10px] font-bold items-center">
                <div class="flex items-center gap-1.5"><span id="gpsD" class="status-dot bg-offline"></span> GPS</div>
                <button onclick="location.reload()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-full transition-all">LOGOUT</button>
            </div>
        </nav>

        <div id="vAdmin" class="hidden space-y-6 pb-10">
            <div class="flex gap-2 mb-4">
                <button onclick="switchTab('tWaktu')" class="tab-btn active px-6 py-3 rounded-2xl glass font-bold text-xs uppercase">Setting Jadwal</button>
                <button onclick="switchTab('tLokasi')" class="tab-btn px-6 py-3 rounded-2xl glass font-bold text-xs uppercase">Lokasi & User</button>
            </div>

            <div id="tWaktu" class="tab-content space-y-4">
                <div class="glass p-6 rounded-3xl overflow-x-auto shadow-2xl">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-bold uppercase"><i class="fas fa-keyboard mr-2 text-sky-400"></i>Edit Jadwal (Ketik Langsung di Tabel)</h3>
                        <div class="flex gap-2">
                            <button onclick="saveAllSettings()" class="bg-emerald-600 hover:bg-emerald-500 text-[10px] px-4 py-2 rounded-xl font-bold"><i class="fas fa-save mr-2"></i>SIMPAN SEMUA</button>
                            <button onclick="addHariBaru()" class="bg-sky-600 text-[10px] px-4 py-2 rounded-xl font-bold">+ HARI</button>
                        </div>
                    </div>
                    <table class="w-full">
                        <thead>
                            <tr>
                                <th rowspan="2">Hari</th>
                                <th colspan="2">Masuk</th>
                                <th colspan="2">Telat</th>
                                <th colspan="2">Pulang</th>
                                <th rowspan="2">Aksi</th>
                            </tr>
                            <tr>
                                <th>Awal</th><th>Akhir</th>
                                <th>Awal</th><th>Akhir</th>
                                <th>Awal</th><th>Akhir</th>
                            </tr>
                        </thead>
                        <tbody id="contH"></tbody>
                    </table>
                    <p class="text-[9px] text-slate-500 mt-4 italic">*Klik pada angka untuk merubah jam, lalu tekan tombol Simpan Semua.</p>
                </div>
            </div>

            <div id="tLokasi" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-xs font-bold mb-6 uppercase"><i class="fas fa-map-marker-alt text-red-400 mr-2"></i>Koordinat Sekolah</h3>
                    <div class="space-y-4">
                        <input id="cLat" class="input-cinematic w-full p-4 rounded-xl text-xs" placeholder="Latitude">
                        <input id="cLng" class="input-cinematic w-full p-4 rounded-xl text-xs" placeholder="Longitude">
                        <input id="cRad" class="input-cinematic w-full p-4 rounded-xl text-xs" placeholder="Radius (Meter)">
                        <button onclick="saveC()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold text-xs uppercase">Simpan Lokasi</button>
                    </div>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <div class="flex justify-between items-center mb-6"><h3 class="text-xs font-bold uppercase">Kelola Admin/OSIS</h3><button onclick="addU()" class="text-[10px] bg-sky-500 px-4 py-2 rounded-xl font-bold">+ USER</button></div>
                    <div id="contU" class="space-y-2"></div>
                </div>
            </div>
        </div>

        <div id="vPetugas" class="hidden">
            <div class="glass p-8 rounded-[2.5rem] text-center shadow-xl max-w-md mx-auto">
                <input id="cariS" list="lS" oninput="cekS(this.value)" class="input-cinematic w-full p-5 rounded-2xl text-center text-lg font-bold mb-4" placeholder="Cari Nama Siswa...">
                <datalist id="lS"></datalist>
                <div id="bK" class="text-sky-400 font-bold mb-6 uppercase text-xs">KELAS: -</div>
                <video id="v" autoplay playsinline class="rounded-3xl mb-6 border-2 border-sky-500 mx-auto w-full shadow-2xl"></video>
                <button id="btnA" onclick="absen()" class="w-full bg-sky-600 py-5 rounded-3xl font-black text-xl uppercase tracking-widest shadow-lg">ABSEN SEKARANG</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycby87-jAj5Cg3FeN3PAc4Cu6_VcL3YyxPaRa8vLtexu9cmfXIpUoaxgdLs5JXmNC52Mv1Q/exec";
        let SISWA = [];

        function msg(t){ const b=document.getElementById('toast'); b.innerText=t; b.classList.remove('hidden'); setTimeout(()=>b.classList.add('hidden'),3000); }

        async function login(){
            const u = document.getElementById('u').value.trim().toLowerCase(), p = document.getElementById('pin').value;
            if(!u || !p) return msg("Isi Username & PIN!");
            msg("Membuka Sistem...");
            const res = await fetch(`${API}?mode=get_users`);
            const users = await res.json();
            const user = users.find(x => x.username == u && x.pin == p);
            if(user) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('roleLabel').innerText = user.role;
                if(user.role == "ADMIN") { document.getElementById('vAdmin').classList.remove('hidden'); loadA(); }
                else { document.getElementById('vPetugas').classList.remove('hidden'); startC(); loadS(); }
                navigator.geolocation.getCurrentPosition(()=>document.getElementById('gpsD').className='status-dot bg-online');
            } else msg("Username/PIN Salah!");
        }

        const cleanJ = (j) => (typeof j === 'string' && j.includes('T')) ? j.split('T')[1].substring(0, 5) : j;

        async function loadA(){
            const [uR, cR, hR] = await Promise.all([fetch(`${API}?mode=get_users`), fetch(`${API}?mode=get_config`), fetch(`${API}?mode=get_settings`)]);
            const users=await uR.json(), config=await cR.json(), hams=await hR.json();
            
            document.getElementById('cLat').value=config.lat; document.getElementById('cLng').value=config.lng; document.getElementById('cRad').value=config.radius;
            
            const cU=document.getElementById('contU'); cU.innerHTML="";
            users.forEach(u=> cU.innerHTML += `<div class="flex justify-between bg-white/5 p-3 rounded-xl border border-white/5 items-center"><span class="text-xs font-bold uppercase">${u.username}</span><button onclick="delU('${u.username}')" class="text-red-400 text-[10px] font-bold">HAPUS</button></div>`);
            
            const cH=document.getElementById('contH'); cH.innerHTML="";
            hams.forEach((h, index)=> {
                cH.innerHTML += `
                <tr data-id="${h[0]}">
                    <td><input class="editable-cell font-bold text-sky-400" value="${h[0]}" readonly></td>
                    <td><input class="editable-cell" type="text" value="${cleanJ(h[1])}"></td>
                    <td><input class="editable-cell" type="text" value="${cleanJ(h[2])}"></td>
                    <td><input class="editable-cell" type="text" value="${cleanJ(h[3])}"></td>
                    <td><input class="editable-cell" type="text" value="${cleanJ(h[4])}"></td>
                    <td><input class="editable-cell" type="text" value="${cleanJ(h[5])}"></td>
                    <td><input class="editable-cell" type="text" value="${cleanJ(h[6])}"></td>
                    <td class="text-center"><button onclick="delH('${h[0]}')" class="text-red-400 p-2"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
        }

        async function saveAllSettings(){
            msg("Menyimpan Data...");
            const rows = document.querySelectorAll("#contH tr");
            for(let tr of rows){
                const inputs = tr.querySelectorAll("input");
                const rowData = Array.from(inputs).map(i => i.value);
                await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_setting",sub:"edit",id:rowData[0],row:rowData})});
            }
            msg("Semua Jadwal Tersimpan!");
            loadA();
        }

        async function addHariBaru(){
            const h = prompt("Nama Hari:");
            if(!h) return;
            const row = [h, "06:00", "07:00", "07:15", "07:30", "13:00", "15:00"];
            await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_setting",sub:"add",row:row})});
            loadA();
        }

        async function delH(id){ if(confirm("Hapus Jadwal "+id+"?")){ await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_setting",sub:"delete",id:id})}); loadA(); } }
        async function saveC(){ await fetch(API,{method:'POST',body:JSON.stringify({action:"update_config", lat:document.getElementById('cLat').value, lng:document.getElementById('cLng').value, radius:document.getElementById('cRad').value})}); msg("Lokasi Tersimpan!"); }
        async function addU(){ const u=prompt("Username:"), r=prompt("Role (ADMIN/PETUGAS):"), pin=prompt("PIN:"); if(!u||!pin) return; await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_user",sub:"add",row:[u,"-",r,pin]})}); loadA(); }
        async function delU(id){ if(confirm("Hapus "+id+"?")){ await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_user",sub:"delete",id:id})}); loadA(); } }
        
        async function startC(){ const s=await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('v').srcObject=s; }
        async function loadS(){ const r=await fetch(`${API}?mode=get_siswa`); SISWA=await r.json(); const dl=document.getElementById('lS'); dl.innerHTML = ""; SISWA.forEach(s=>{let o=document.createElement('option'); o.value=s.nama; dl.appendChild(o);}); }
        function cekS(v){ const s=SISWA.find(x=>x.nama==v); document.getElementById('bK').innerText=s?`KELAS: ${s.kelas}`:"KELAS: -"; }
        function switchTab(tId){ document.querySelectorAll('.tab-content').forEach(c=>c.classList.add('hidden')); document.getElementById(tId).classList.remove('hidden'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); }

        async function absen(){
            const n=document.getElementById('cariS').value; const s=SISWA.find(x=>x.nama==n); if(!s) return msg("Pilih Siswa!");
            const btn=document.getElementById('btnA'); btn.disabled=true; btn.innerText="PROSES...";
            const v=document.getElementById('v'), c=document.createElement('canvas');
            c.width=v.videoWidth; c.height=v.videoHeight; c.getContext('2d').drawImage(v,0,0);
            navigator.geolocation.getCurrentPosition(async (p)=>{
                const res = await fetch(API, {method:'POST', body:JSON.stringify({action:"absen", nama:s.nama, kelas:s.kelas, hp:s.hp, lat:p.coords.latitude, lng:p.coords.longitude, foto:c.toDataURL('image/jpeg',0.5)})});
                msg(await res.text()); btn.disabled=false; btn.innerText="ABSEN SEKARANG"; document.getElementById('cariS').value="";
            }, ()=>{ msg("GPS OFF!"); btn.disabled=false; btn.innerText="ABSEN SEKARANG"; });
        }
    </script>
</body>
</html>
