<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Neduka v3.9 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .input-cinematic { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.2); color: white; }
        .hidden { display: none !important; }
        video { border-radius: 1.5rem; width: 100%; transform: scaleX(-1); background: #000; }
    </style>
</head>
<body class="p-2 min-h-screen flex flex-col items-center justify-center">
    <div id="toast" class="fixed top-6 glass p-4 rounded-2xl hidden z-50 border-sky-500 border text-sm font-bold text-center shadow-2xl"></div>

    <div id="loginPage" class="w-full max-w-sm glass p-10 rounded-[2.5rem] text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/2602/2602414.png" class="w-20 mx-auto mb-6">
        <h1 class="font-bold text-xl uppercase tracking-tight text-white">SMPN 2 KAWALI</h1>
        <p class="text-slate-400 text-[10px] mb-8 tracking-widest">PRESENSI DIGITAL v3.9</p>
        <div class="space-y-4">
            <input id="u" class="input-cinematic w-full p-4 rounded-2xl text-center font-bold" placeholder="USERNAME">
            <input id="pin" type="password" class="input-cinematic w-full p-4 rounded-2xl text-center tracking-[0.5em]" placeholder="PIN">
            <button onclick="login()" id="btnLogin" class="w-full bg-sky-600 p-4 rounded-2xl font-bold text-white transition-all active:scale-95">MASUK</button>
        </div>
    </div>

    <div id="app" class="hidden w-full max-w-lg space-y-4">
        <div class="glass p-4 rounded-3xl flex justify-between items-center px-6">
            <span id="roleLabel" class="text-[10px] font-bold bg-sky-500/20 text-sky-400 px-3 py-1 rounded-full uppercase"></span>
            <div class="flex items-center gap-2 text-[10px] font-bold">
                <div id="gpsD" class="w-2 h-2 rounded-full bg-red-500"></div> GPS: <span id="distLabel">...</span>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-red-500 font-bold uppercase">Logout</button>
        </div>

        <div id="vPetugas" class="hidden glass p-6 rounded-[2.5rem] space-y-4">
            <input id="cariS" list="lS" oninput="cekS(this.value)" class="input-cinematic w-full p-4 rounded-2xl font-bold text-center text-lg" placeholder="Nama Siswa...">
            <datalist id="lS"></datalist>
            <div id="bK" class="bg-sky-500/10 text-sky-400 font-bold py-2 rounded-xl text-center text-[10px] uppercase">KELAS: -</div>
            <video id="v" autoplay playsinline></video>
            <button id="btnA" onclick="absen()" class="w-full bg-sky-600 py-5 rounded-[2rem] font-black text-xl uppercase disabled:opacity-30" disabled>ABSEN SEKARANG</button>
        </div>

        <div id="vAdmin" class="hidden glass p-6 rounded-[2.5rem] text-center">
            <p class="text-sky-400 font-bold text-sm mb-4">PANEL ADMIN AKTIF</p>
            <p class="text-xs text-slate-400">Silakan gunakan komputer untuk pengaturan yang lebih lengkap.</p>
        </div>
    </div>

    <script>
        // PENTING: GANTI URL DI BAWAH INI DENGAN URL SCRIPT APP BAPAK YANG BARU!
        const API = "URL_APPS_SCRIPT_BAPAK_DI_SINI";
        
        let SISWA = [], lastPos = null, config = null;

        function msg(t){ const b = document.getElementById('toast'); b.innerText = t; b.classList.remove('hidden'); setTimeout(()=>b.classList.add('hidden'),3000); }

        async function login(){
            const u = document.getElementById('u').value, p = document.getElementById('pin').value;
            const btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.innerText = "LOADING...";
            try {
                const res = await fetch(`${API}?mode=get_users`);
                const users = await res.json();
                const user = users.find(x => x.username.toLowerCase() == u.toLowerCase() && x.pin == p);
                if(user) {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('roleLabel').innerText = user.role;
                    if(user.role === "ADMIN") document.getElementById('vAdmin').classList.remove('hidden');
                    else { document.getElementById('vPetugas').classList.remove('hidden'); startCam(); loadSiswa(); startGPS(); }
                } else { msg("Salah PIN/Username!"); btn.disabled = false; btn.innerText = "MASUK"; }
            } catch(e) { msg("Koneksi Gagal! Cek Deployment Script."); btn.disabled = false; btn.innerText = "MASUK"; }
        }

        async function startCam(){ try { document.getElementById('v').srcObject = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}); } catch(e){ msg("Izin Kamera Ditolak!"); } }
        async function loadSiswa(){ const res = await fetch(`${API}?mode=get_siswa`); SISWA = await res.json(); const dl = document.getElementById('lS'); SISWA.forEach(s=>{ let o = document.createElement('option'); o.value = s.nama; dl.appendChild(o); }); }
        
        function startGPS(){
            fetch(`${API}?mode=get_config`).then(r=>r.json()).then(c=>{ config = c;
                navigator.geolocation.watchPosition(p=>{
                    lastPos = p.coords;
                    const d = Math.round(getDist(p.coords.latitude, p.coords.longitude, config.lat, config.lng));
                    document.getElementById('distLabel').innerText = d + "m";
                    document.getElementById('gpsD').className = 'w-2 h-2 rounded-full bg-green-500';
                    const btn = document.getElementById('btnA');
                    if(d > config.radius) { btn.disabled = true; btn.innerText = "DILUAR RADIUS"; }
                    else { btn.innerText = "ABSEN SEKARANG"; cekS(document.getElementById('cariS').value); }
                }, e=>msg("Aktifkan GPS!"), {enableHighAccuracy:true});
            });
        }

        function getDist(la1, lo1, la2, lo2) {
            const R = 6371000, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function cekS(v){ const s = SISWA.find(x=>x.nama===v); document.getElementById('bK').innerText = s ? `KELAS: ${s.kelas}` : "KELAS: -"; document.getElementById('btnA').disabled = !s; }

        async function absen(){
            const s = SISWA.find(x=>x.nama===document.getElementById('cariS').value);
            const btn = document.getElementById('btnA'); btn.disabled = true; btn.innerText = "MENGIRIM...";
            const canvas = document.createElement('canvas'); canvas.width=400; canvas.height=400;
            canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 400, 400);
            try {
                const res = await fetch(API, {method:'POST', body:JSON.stringify({action:"absen", nama:s.nama, kelas:s.kelas, lat:lastPos.latitude, lng:lastPos.longitude, foto:canvas.toDataURL('image/jpeg', 0.5)})});
                msg("BERHASIL: " + await res.text());
                document.getElementById('cariS').value = ""; cekS("");
            } catch(e){ msg("Gagal Kirim!"); }
            btn.disabled = false; btn.innerText = "ABSEN SEKARANG";
        }
    </script>
</body>
</html>
