<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Neduka v4.1 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        video { border-radius: 1rem; width: 100%; transform: scaleX(-1); background: #000; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">
    <div id="toast" class="fixed top-4 glass p-4 rounded-xl hidden z-50 border-sky-500 border text-sm text-center"></div>

    <div id="loginPage" class="glass p-8 rounded-3xl w-full max-w-sm text-center">
        <h1 class="font-bold text-xl mb-6">LOGIN NEDUKA</h1>
        <div class="space-y-4">
            <input id="u" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-center" placeholder="USERNAME">
            <input id="pin" type="password" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-center" placeholder="PIN">
            <button onclick="login()" id="btnLogin" class="w-full bg-sky-600 p-4 rounded-xl font-bold">MASUK</button>
        </div>
    </div>

    <div id="app" class="hidden w-full max-w-md space-y-4">
        <div class="glass p-4 rounded-2xl flex justify-between items-center text-[10px]">
            <span id="roleLabel" class="bg-sky-500/20 text-sky-400 px-2 py-1 rounded"></span>
            <span>GPS: <span id="distLabel">...</span></span>
            <button onclick="location.reload()" class="text-red-500 font-bold">LOGOUT</button>
        </div>
        <div id="vPetugas" class="glass p-6 rounded-3xl space-y-4 text-center">
            <input id="cariS" list="lS" oninput="cekS(this.value)" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-center font-bold" placeholder="Cari Nama Siswa...">
            <datalist id="lS"></datalist>
            <video id="v" autoplay playsinline></video>
            <button id="btnA" onclick="absen()" class="w-full bg-sky-600 py-4 rounded-2xl font-bold uppercase disabled:opacity-30" disabled>ABSEN SEKARANG</button>
        </div>
        <div id="vAdmin" class="hidden glass p-6 rounded-3xl text-center text-xs">
            <p class="text-sky-400 font-bold mb-2">MODE ADMIN</p>
            <p>Silakan gunakan Dashboard Google Sheet untuk manajemen data.</p>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzpAMRBe7MPI0AGKO_qDSY2GSx3-Q8YXB8hgrNNp-dUDIKUIeieSRBQju9Xkvip_vTZhw/exec";
        let SISWA = [], lastPos = null, config = null;

        function msg(t){ const b=document.getElementById('toast'); b.innerText=t; b.classList.remove('hidden'); setTimeout(()=>b.classList.add('hidden'),3000); }

        async function login(){
            const u = document.getElementById('u').value, p = document.getElementById('pin').value;
            const btn = document.getElementById('btnLogin');
            btn.innerText = "AUTHENTICATING...";
            try {
                const res = await fetch(`${API}?mode=get_users`);
                const users = await res.json();
                const user = users.find(x => x.username.toLowerCase() == u.toLowerCase() && x.pin == p);
                if(user) {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('roleLabel').innerText = user.role;
                    if(user.role.toUpperCase() === "ADMIN") document.getElementById('vAdmin').classList.remove('hidden');
                    else { document.getElementById('vPetugas').classList.remove('hidden'); startCam(); loadSiswa(); startGPS(); }
                } else { msg("PIN/User Salah!"); btn.innerText = "MASUK"; }
            } catch(e) { msg("Koneksi Gagal!"); btn.innerText = "MASUK"; }
        }

        async function startCam(){ document.getElementById('v').srcObject = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}); }
        async function loadSiswa(){ const res = await fetch(`${API}?mode=get_siswa`); SISWA = await res.json(); const dl = document.getElementById('lS'); SISWA.forEach(s=>{ let o=document.createElement('option'); o.value=s.nama; dl.appendChild(o); }); }
        
        function startGPS(){
            fetch(`${API}?mode=get_config`).then(r=>r.json()).then(c=>{ config = c;
                navigator.geolocation.watchPosition(p=>{
                    lastPos = p.coords;
                    const d = Math.round(getDist(p.coords.latitude, p.coords.longitude, config.lat, config.lng));
                    document.getElementById('distLabel').innerText = d + "m";
                    const btn = document.getElementById('btnA');
                    if(d > config.radius) { btn.disabled = true; btn.innerText = "DILUAR RADIUS"; }
                    else { btn.innerText = "ABSEN SEKARANG"; cekS(document.getElementById('cariS').value); }
                }, e=>msg("GPS Mati!"), {enableHighAccuracy:true});
            });
        }

        function getDist(la1, lo1, la2, lo2) {
            const R = 6371000, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function cekS(v){ const s = SISWA.find(x=>x.nama===v); document.getElementById('btnA').disabled = !s; }

        async function absen(){
            const s = SISWA.find(x=>x.nama===document.getElementById('cariS').value);
            const btn = document.getElementById('btnA'); btn.innerText = "MENGIRIM...";
            const canvas = document.createElement('canvas'); canvas.width=400; canvas.height=400;
            canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 400, 400);
            try {
                const res = await fetch(API, {method:'POST', body:JSON.stringify({action:"absen", nama:s.nama, kelas:s.kelas, lat:lastPos.latitude, lng:lastPos.longitude, foto:canvas.toDataURL('image/jpeg', 0.5)})});
                msg("BERHASIL: " + await res.text());
                document.getElementById('cariS').value = "";
            } catch(e){ msg("Gagal!"); }
            btn.innerText = "ABSEN SEKARANG";
        }
    </script>
</body>
</html>
