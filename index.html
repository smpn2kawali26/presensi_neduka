<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi SMPN 2 Kawali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .input-cinematic { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.2); color: white; transition: all 0.3s; }
        .input-cinematic:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .tab-btn.active { background: #38bdf8; color: #0f172a; }
        .hidden { display: none !important; }
        table th, table td { border: 1px solid rgba(255,255,255,0.1); padding: 8px; text-align: center; font-size: 11px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .bg-online { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .bg-offline { background: #fb7185; }
    </style>
</head>
<body class="p-2 md:p-4 min-h-screen">
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 glass p-4 rounded-2xl hidden z-[100] text-sm font-bold border-sky-500 border text-center min-w-[280px] shadow-2xl"></div>

    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl border border-white/10">
            <img src="https://cdn-icons-png.flaticon.com/512/2602/2602414.png" class="w-20 mx-auto mb-6">
            <h1 class="font-bold text-xl uppercase tracking-tight">SMPN 2 KAWALI</h1>
            <p class="text-slate-400 text-[10px] mb-8 tracking-widest uppercase">Sistem Absensi v2.1</p>
            <div class="space-y-4">
                <input id="u" class="input-cinematic w-full p-4 rounded-2xl text-center" placeholder="USERNAME">
                <input id="pin" type="password" class="input-cinematic w-full p-4 rounded-2xl text-center tracking-[0.5em]" placeholder="PIN">
                <button onclick="login()" class="w-full bg-sky-600 hover:bg-sky-500 p-4 rounded-2xl font-bold text-white transition-all shadow-lg active:scale-95">MASUK KE SISTEM</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-6xl mx-auto">
        <nav class="flex justify-between items-center glass p-4 rounded-3xl mb-6 px-6">
            <div class="flex items-center gap-3">
                <span id="roleLabel" class="text-[10px] font-bold bg-sky-500/20 text-sky-400 px-3 py-1 rounded-full uppercase">USER</span>
            </div>
            <div class="flex gap-4 text-[10px] font-bold items-center">
                <div class="flex items-center gap-1.5"><span id="gpsD" class="status-dot bg-offline"></span> GPS</div>
                <div class="flex items-center gap-1.5"><span id="camD" class="status-dot bg-offline"></span> CAM</div>
                <button onclick="location.reload()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-full transition-all">LOGOUT</button>
            </div>
        </nav>

        <div id="vAdmin" class="hidden space-y-6 pb-10">
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="switchTab('tWaktu', this)" class="tab-btn active px-6 py-3 rounded-2xl glass font-bold text-xs whitespace-nowrap uppercase">Setting Waktu</button>
                <button onclick="switchTab('tLokasi', this)" class="tab-btn px-6 py-3 rounded-2xl glass font-bold text-xs whitespace-nowrap uppercase">Lokasi & User</button>
                <button onclick="switchTab('tLaporan', this)" class="tab-btn px-6 py-3 rounded-2xl glass font-bold text-xs whitespace-nowrap uppercase">Laporan Rekap</button>
            </div>

            <div id="tWaktu" class="tab-content space-y-4">
                <div class="glass p-6 rounded-3xl overflow-x-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-bold uppercase"><i class="fas fa-clock mr-2 text-sky-400"></i>Jadwal Harian</h3>
                        <button onclick="manageH('add')" class="bg-sky-500 text-[10px] px-4 py-2 rounded-xl font-bold">+ HARI</button>
                    </div>
                    <table class="w-full">
                        <thead><tr class="text-slate-400 bg-white/5"><th>Hari</th><th>Masuk</th><th>Batas</th><th>Telat</th><th>Batas</th><th>Pulang</th><th>Batas</th><th>Aksi</th></tr></thead>
                        <tbody id="contH"></tbody>
                    </table>
                </div>
            </div>

            <div id="tLokasi" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-xs font-bold mb-6 uppercase"><i class="fas fa-map-marker-alt text-red-400 mr-2"></i>Geofencing</h3>
                    <div class="space-y-4">
                        <input id="cLat" class="input-cinematic w-full p-4 rounded-xl text-xs" placeholder="Latitude">
                        <input id="cLng" class="input-cinematic w-full p-4 rounded-xl text-xs" placeholder="Longitude">
                        <input id="cRad" class="input-cinematic w-full p-4 rounded-xl text-xs" placeholder="Radius (Meter)">
                        <button onclick="saveC()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold text-xs">SIMPAN KONFIGURASI</button>
                    </div>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <div class="flex justify-between items-center mb-6"><h3 class="text-xs font-bold uppercase">Kelola Petugas</h3></div>
                    <div id="contU" class="space-y-2"></div>
                </div>
            </div>

            <div id="tLaporan" class="tab-content hidden space-y-4">
                <div class="glass p-6 rounded-3xl">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-bold uppercase">Rekap Bulanan</h3>
                        <button onclick="downloadPDF()" class="bg-red-600 text-xs px-5 py-2.5 rounded-xl font-bold">PDF</button>
                    </div>
                    <table class="w-full" id="pdfTable">
                        <thead><tr class="bg-white/5"><th>Nama</th><th>H</th><th>S</th><th>I</th><th>A</th><th>T</th></tr></thead>
                        <tbody id="contL"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="vPetugas" class="hidden">
            <div class="glass p-8 rounded-[2.5rem] text-center shadow-xl max-w-md mx-auto">
                <input id="cariS" list="lS" onchange="pilihSiswa(this.value)" class="input-cinematic w-full p-5 rounded-2xl text-center text-lg font-bold mb-4" placeholder="Ketik Nama Siswa...">
                <datalist id="lS"></datalist>
                <div id="bK" class="text-sky-400 font-bold mb-6 text-xl">KELAS: -</div>
                <div class="relative inline-block w-full">
                    <video id="v" autoplay playsinline class="rounded-3xl mb-6 border-2 border-sky-500/50 mx-auto w-full bg-black"></video>
                    <canvas id="canvas" class="hidden"></canvas>
                </div>
                <button id="btnA" onclick="absen()" class="w-full bg-sky-600 py-5 rounded-3xl font-black text-xl tracking-widest disabled:opacity-50">ABSEN SEKARANG</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwwytzUd3cnzgM37lsV_QBs9khM4cgsF6-jRaqTjKtC_58Hxb8t8ZTDJNW_LDFKjAgvpg/exec";
        let SISWA = [], SELECTED_SISWA = null, LAT = 0, LNG = 0;

        function msg(t){ 
            const b=document.getElementById('toast'); 
            b.innerText=t; b.classList.remove('hidden'); 
            setTimeout(()=>b.classList.add('hidden'),3000); 
        }

        async function login(){
            const u = document.getElementById('u').value.trim().toLowerCase();
            const p = document.getElementById('pin').value.trim();
            if(!u || !p) return msg("Isi Username & PIN!");
            
            msg("Otentikasi...");
            try {
                const res = await fetch(`${API}?mode=get_users`);
                const users = await res.json();
                const user = users.find(x => x.username == u && x.pin == p);
                
                if(user) {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('roleLabel').innerText = user.role;
                    if(user.role == "ADMIN") {
                        document.getElementById('vAdmin').classList.remove('hidden');
                        loadA(); loadLaporan();
                    } else {
                        document.getElementById('vPetugas').classList.remove('hidden');
                        startC(); loadS();
                    }
                    initGPS();
                } else msg("Username/PIN Salah!");
            } catch(e) { msg("Gagal terhubung ke Server!"); }
        }

        function initGPS() {
            navigator.geolocation.watchPosition(p => {
                LAT = p.coords.latitude; LNG = p.coords.longitude;
                document.getElementById('gpsD').className = 'status-dot bg-online';
            }, () => msg("Aktifkan GPS!"), {enableHighAccuracy:true});
        }

        async function startC(){
            try {
                const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
                document.getElementById('v').srcObject = s;
                document.getElementById('camD').className = 'status-dot bg-online';
            } catch(e) { msg("Kamera diblokir!"); }
        }

        async function loadS(){
            const res = await fetch(`${API}?mode=get_siswa`);
            SISWA = await res.json();
            const dl = document.getElementById('lS');
            dl.innerHTML = SISWA.map(s => `<option value="${s.nama}">`).join('');
        }

        function pilihSiswa(val){
            const s = SISWA.find(x => x.nama === val);
            if(s) {
                SELECTED_SISWA = s;
                document.getElementById('bK').innerText = "KELAS: " + s.kelas;
            } else {
                SELECTED_SISWA = null;
                document.getElementById('bK').innerText = "KELAS: -";
            }
        }

        async function absen(){
            if(!SELECTED_SISWA) return msg("Pilih Siswa!");
            if(LAT === 0) return msg("Menunggu sinyal GPS...");

            const btn = document.getElementById('btnA');
            btn.disabled = true; msg("Memproses...");

            // Capture Foto (Base64)
            const video = document.getElementById('v');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const foto = canvas.toDataURL('image/jpeg', 0.7);

            const payload = {
                action: "absen",
                nama: SELECTED_SISWA.nama,
                kelas: SELECTED_SISWA.kelas,
                hp: SELECTED_SISWA.hp,
                lat: LAT, lng: LNG,
                foto: foto
            };

            try {
                const res = await fetch(API, {method: 'POST', body: JSON.stringify(payload)});
                const result = await res.text();
                msg("HASIL: " + result);
                document.getElementById('cariS').value = "";
                document.getElementById('bK').innerText = "KELAS: -";
                SELECTED_SISWA = null;
            } catch(e) { msg("Gagal kirim data!"); }
            btn.disabled = false;
        }

        // --- ADMIN FUNCTIONS ---
        async function loadA(){
            const [cR, hR, uR] = await Promise.all([
                fetch(`${API}?mode=get_config`), 
                fetch(`${API}?mode=get_settings`),
                fetch(`${API}?mode=get_users`)
            ]);
            const config = await cR.json(), hams = await hR.json(), users = await uR.json();
            
            document.getElementById('cLat').value = config.lat;
            document.getElementById('cLng').value = config.lng;
            document.getElementById('cRad').value = config.radius;

            const cH = document.getElementById('contH');
            const clean = (j) => (typeof j === 'string' && j.includes('T')) ? j.split('T')[1].substring(0, 5) : j;
            cH.innerHTML = hams.map(h => `
                <tr>
                    <td class="font-bold">${h[0]}</td>
                    <td>${clean(h[1])}</td><td>${clean(h[2])}</td>
                    <td>${clean(h[3])}</td><td>${clean(h[4])}</td>
                    <td>${clean(h[5])}</td><td>${clean(h[6])}</td>
                    <td><button onclick="delH('${h[0]}')" class="text-red-400"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('');

            const cU = document.getElementById('contU');
            cU.innerHTML = users.map(u => `
                <div class="flex justify-between glass p-3 rounded-xl items-center">
                    <span class="text-xs font-bold">${u.username} (${u.role})</span>
                    <button class="text-red-400 text-[10px]">HAPUS</button>
                </div>`).join('');
        }

        async function saveC(){
            msg("Menyimpan...");
            await fetch(API, {method:'POST', body: JSON.stringify({
                action: "update_config",
                lat: document.getElementById('cLat').value,
                lng: document.getElementById('cLng').value,
                radius: document.getElementById('cRad').value
            })});
            msg("Konfigurasi disimpan!");
        }

        async function loadLaporan(){
            const res = await fetch(`${API}?mode=get_rekap`);
            const data = await res.json();
            document.getElementById('contL').innerHTML = data.map(r => 
                `<tr><td>${r.nama}</td><td>${r.hadir}</td><td>${r.sakit}</td><td>${r.izin}</td><td>${r.alpa}</td><td>${r.telat}</td></tr>`
            ).join('');
        }

        function switchTab(tId, btn){
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function downloadPDF(){
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("REKAP ABSENSI SMPN 2 KAWALI", 105, 20, {align:"center"});
            doc.autoTable({ html: '#pdfTable', startY: 30, theme: 'grid' });
            doc.save("Rekap_Absensi.pdf");
        }
    </script>
</body>
</html>
