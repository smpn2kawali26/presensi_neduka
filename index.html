<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi SMPN 2 Kawali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .input-cinematic { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.2); color: white; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .bg-online { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .bg-offline { background: #fb7185; }
        video { width: 100%; max-width: 400px; border-radius: 24px; border: 2px solid #38bdf8; transform: scaleX(-1); margin: 0 auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 min-h-screen">
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 glass p-4 rounded-2xl hidden z-[99] text-sm font-bold border-sky-500 border text-center min-w-[250px]"></div>

    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <img src="logo.png" class="w-20 mx-auto mb-6" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2602/2602414.png'">
            <h1 class="font-bold text-xl tracking-tight">SMPN 2 KAWALI</h1>
            <p class="text-slate-400 text-[10px] mb-8 uppercase tracking-widest">Sistem Absensi v2.0</p>
            <div class="space-y-4">
                <input id="u" class="input-cinematic w-full p-4 rounded-2xl" placeholder="Username">
                <input id="pin" type="password" class="input-cinematic w-full p-4 rounded-2xl text-center tracking-[0.5em]" placeholder="PIN">
                <button onclick="login()" class="w-full bg-sky-600 hover:bg-sky-500 p-4 rounded-2xl font-bold text-white transition-all shadow-lg shadow-sky-900/20">MASUK KE SISTEM</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-xl mx-auto">
        <nav class="flex justify-between items-center glass p-4 rounded-3xl mb-6 px-6">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="w-6" onerror="this.style.display='none'">
                <span id="roleLabel" class="text-[10px] font-bold bg-sky-500/20 text-sky-400 px-3 py-1 rounded-full uppercase"></span>
            </div>
            <div class="flex gap-4 text-[10px] font-bold">
                <div class="flex items-center gap-1.5"><span id="gpsD" class="status-dot bg-offline"></span> GPS</div>
                <div class="flex items-center gap-1.5"><span id="camD" class="status-dot bg-offline"></span> CAM</div>
                <button onclick="location.reload()" class="bg-red-500/20 text-red-400 px-3 py-1 rounded-full">OUT</button>
            </div>
        </nav>

        <div id="vPetugas" class="hidden space-y-6">
            <div class="glass p-8 rounded-[2.5rem] text-center shadow-xl">
                <div class="relative mb-6">
                    <input id="cariS" list="lS" oninput="cekS(this.value)" class="input-cinematic w-full p-5 rounded-2xl text-center text-lg font-bold shadow-inner" placeholder="Ketik Nama Siswa...">
                    <datalist id="lS"></datalist>
                </div>
                <div id="bK" class="bg-sky-500/10 border border-sky-500/30 text-sky-400 py-2 px-4 rounded-full inline-block font-bold text-xs mb-6">KELAS: -</div>
                <video id="v" autoplay playsinline class="shadow-2xl"></video>
                <button id="btnA" onclick="absen()" class="w-full bg-gradient-to-r from-sky-600 to-blue-600 py-5 rounded-3xl font-black text-xl mt-8 shadow-xl uppercase tracking-widest">ABSEN SEKARANG</button>
            </div>
        </div>

        <div id="vAdmin" class="hidden space-y-6 pb-10">
            <div class="glass p-6 rounded-3xl">
                <h3 class="text-xs font-bold mb-4 flex items-center gap-2"><i class="fas fa-map-marker-alt text-red-400"></i> LOKASI & RADIUS SEKOLAH</h3>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-[8px] ml-2 text-slate-400">LATITUDE</label><input id="cLat" class="input-cinematic w-full p-3 rounded-xl text-xs" placeholder="Lat"></div>
                    <div><label class="text-[8px] ml-2 text-slate-400">LONGITUDE</label><input id="cLng" class="input-cinematic w-full p-3 rounded-xl text-xs" placeholder="Lng"></div>
                </div>
                <div class="mb-4">
                    <label class="text-[8px] ml-2 text-slate-400">RADIUS JANGKAUAN (METER)</label>
                    <input id="cRad" class="input-cinematic w-full p-3 rounded-xl text-xs" placeholder="Contoh: 100">
                </div>
                <button onclick="saveC()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold text-xs transition-all shadow-lg shadow-emerald-900/20">UPDATE KONFIGURASI</button>
            </div>
            
            <div class="glass p-6 rounded-3xl">
                <div class="flex justify-between items-center mb-4"><h3 class="text-xs font-bold"><i class="fas fa-users text-sky-400 mr-2"></i>KELOLA USER</h3><button onclick="addU()" class="text-[10px] bg-sky-500/20 text-sky-400 px-3 py-1 rounded-lg font-bold">+ TAMBAH USER</button></div>
                <div id="contU" class="space-y-3"></div>
            </div>

            <div class="glass p-6 rounded-3xl">
                <div class="flex justify-between items-center mb-4"><h3 class="text-xs font-bold"><i class="fas fa-clock text-purple-400 mr-2"></i>SETTING HARI</h3><button onclick="addH()" class="text-[10px] bg-purple-500/20 text-purple-400 px-3 py-1 rounded-lg font-bold">+ TAMBAH HARI</button></div>
                <div id="contH" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycby87-jAj5Cg3FeN3PAc4Cu6_VcL3YyxPaRa8vLtexu9cmfXIpUoaxgdLs5JXmNC52Mv1Q/exec";
        let SISWA = [];

        function msg(t){ const b=document.getElementById('toast'); b.innerText=t; b.classList.remove('hidden'); setTimeout(()=>b.classList.add('hidden'),3000); }

        async function login(){
            const u = document.getElementById('u').value.trim().toLowerCase();
            const p = document.getElementById('pin').value.trim();
            if(!u || !p) return msg("Lengkapi data login!");
            msg("Mengecek Akses...");
            try {
                const res = await fetch(`${API}?mode=get_users`);
                const users = await res.json();
                const user = users.find(x => x.username == u && x.pin == p);
                if(user) {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('roleLabel').innerText = user.role;
                    checkH();
                    if(user.role == "ADMIN") { document.getElementById('vAdmin').classList.remove('hidden'); loadA(); }
                    else { document.getElementById('vPetugas').classList.remove('hidden'); startC(); loadS(); }
                    msg("Selamat Datang!");
                } else msg("Username atau PIN Salah!");
            } catch(e) { msg("Gagal terhubung ke Database!"); }
        }

        function checkH(){
            navigator.geolocation.getCurrentPosition(()=>document.getElementById('gpsD').className='status-dot bg-online');
            navigator.mediaDevices.getUserMedia({video:true}).then(()=>document.getElementById('camD').className='status-dot bg-online');
        }

        async function startC(){ const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}); document.getElementById('v').srcObject=s; }
        async function loadS(){ const r=await fetch(`${API}?mode=get_siswa`); SISWA=await r.json(); const dl=document.getElementById('lS'); dl.innerHTML = ""; SISWA.forEach(s=>{let o=document.createElement('option'); o.value=s.nama; dl.appendChild(o);}); }
        function cekS(v){ const s=SISWA.find(x=>x.nama==v); document.getElementById('bK').innerText=s?`KELAS: ${s.kelas}`:"KELAS: -"; }

        async function absen(){
            const n=document.getElementById('cariS').value; const s=SISWA.find(x=>x.nama==n); if(!s) return msg("Pilih nama siswa!");
            const btn=document.getElementById('btnA'); btn.disabled=true; btn.innerText="PROSES ABSENSI...";
            const v=document.getElementById('v'), c=document.createElement('canvas');
            c.width=v.videoWidth; c.height=v.videoHeight; c.getContext('2d').drawImage(v,0,0);
            navigator.geolocation.getCurrentPosition(async (p)=>{
                const res = await fetch(API, {method:'POST', body:JSON.stringify({action:"absen", nama:s.nama, kelas:s.kelas, hp:s.hp, lat:p.coords.latitude, lng:p.coords.longitude, foto:c.toDataURL('image/jpeg',0.5)})});
                msg(await res.text()); btn.disabled=false; btn.innerText="ABSEN SEKARANG"; document.getElementById('cariS').value="";
            }, ()=>{ msg("Gagal mendapatkan lokasi GPS!"); btn.disabled=false; btn.innerText="ABSEN SEKARANG"; });
        }

        async function loadA(){
            const [uR, cR, hR] = await Promise.all([fetch(`${API}?mode=get_users`), fetch(`${API}?mode=get_config`), fetch(`${API}?mode=get_settings`)]);
            const users=await uR.json(), config=await cR.json(), hams=await hR.json();
            document.getElementById('cLat').value=config.lat; document.getElementById('cLng').value=config.lng; document.getElementById('cRad').value=config.radius;
            
            const cU=document.getElementById('contU'); cU.innerHTML="";
            users.forEach(u=> cU.innerHTML += `<div class="flex justify-between bg-white/5 p-3 rounded-2xl border border-white/5 items-center"><span class="text-xs font-bold">${u.username} <span class="text-[9px] text-slate-500">(${u.role})</span></span><button onclick="delU('${u.username}')" class="text-red-400 text-[10px] font-bold">HAPUS</button></div>`);
            
            const cH=document.getElementById('contH'); cH.innerHTML="";
            hams.forEach(h=> cH.innerHTML += `<div class="flex justify-between bg-white/5 p-3 rounded-2xl border border-white/5 items-center"><span class="text-xs font-bold">${h[0]} <span class="text-[9px] text-sky-500">(${h[1]}-${h[5]})</span></span><button onclick="delH('${h[0]}')" class="text-red-400 text-[10px] font-bold">HAPUS</button></div>`);
        }

        async function saveC(){ await fetch(API,{method:'POST',body:JSON.stringify({action:"update_config", lat:document.getElementById('cLat').value, lng:document.getElementById('cLng').value, radius:document.getElementById('cRad').value})}); msg("Konfigurasi disimpan!"); }
        async function addU(){ const u=prompt("Username:"), r=prompt("Role (ADMIN/PETUGAS):"), pin=prompt("PIN:"); if(!u||!pin) return; await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_user",sub:"add",row:[u,"-",r,pin]})}); loadA(); }
        async function delU(id){ if(confirm("Hapus user "+id+"?")){ await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_user",sub:"delete",id:id})}); loadA(); } }
        async function addH(){ const h=prompt("Nama Hari:"); if(!h) return; await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_setting",sub:"add",row:[h,"06:00","07:00","07:15","08:00","13:00","15:00"]})}); loadA(); }
        async function delH(id){ if(confirm("Hapus hari "+id+"?")){ await fetch(API,{method:'POST',body:JSON.stringify({action:"manage_setting",sub:"delete",id:id})}); loadA(); } }
    </script>
</body>
</html>
