<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Neduka v4.5 Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        video { width: 100%; border-radius: 1.5rem; transform: scaleX(-1); background: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-3 md:p-6">
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 glass p-4 rounded-2xl hidden z-[100] text-sm font-bold border-sky-500 border text-white shadow-2xl"></div>

    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center">
            <i class="fas fa-fingerprint text-5xl text-sky-500 mb-6"></i>
            <h1 class="font-bold text-xl uppercase tracking-tighter">SMPN 2 KAWALI</h1>
            <p class="text-slate-400 text-[10px] mb-8 tracking-widest uppercase">Digital Attendance v4.5</p>
            <div class="space-y-4">
                <input id="u" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-center font-bold" placeholder="USERNAME">
                <input id="pin" type="password" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-center tracking-[0.5em]" placeholder="PIN">
                <button onclick="login()" id="btnLogin" class="w-full bg-sky-600 hover:bg-sky-500 p-4 rounded-2xl font-bold transition-all active:scale-95">MASUK</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden max-w-4xl mx-auto space-y-4">
        <nav class="glass p-4 rounded-3xl flex justify-between items-center px-6">
            <div class="flex items-center gap-3">
                <span id="roleLabel" class="text-[10px] font-bold bg-sky-500/20 text-sky-400 px-3 py-1 rounded-full uppercase"></span>
            </div>
            <div class="flex items-center gap-4 text-[10px] font-bold">
                <div id="gpsStatus" class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-red-500"></div> GPS: <span id="distLabel">...</span></div>
                <button onclick="location.reload()" class="text-red-500"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div id="vPetugas" class="hidden max-w-md mx-auto space-y-4">
            <div class="glass p-6 rounded-[2.5rem] space-y-4">
                <input id="cariS" list="lS" oninput="cekS(this.value)" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-center font-bold text-lg" placeholder="Nama Siswa...">
                <datalist id="lS"></datalist>
                <div id="bK" class="bg-sky-500/10 text-sky-400 font-bold py-2 rounded-xl text-center text-[10px] uppercase">KELAS: -</div>
                <video id="v" autoplay playsinline></video>
                <button id="btnA" onclick="absen()" class="w-full bg-sky-600 py-5 rounded-[2rem] font-black text-xl uppercase shadow-xl disabled:opacity-30" disabled>ABSEN SEKARANG</button>
            </div>
        </div>

        <div id="vAdmin" class="hidden space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-sky-400 font-bold text-sm mb-4"><i class="fas fa-map-marker-alt mr-2"></i>SETTING LOKASI</h3>
                    <div class="space-y-3">
                        <input id="cLat" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs" placeholder="Latitude">
                        <input id="cLng" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs" placeholder="Longitude">
                        <input id="cRad" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs" placeholder="Radius (Meter)">
                        <button onclick="saveConfig()" class="w-full bg-emerald-600 p-3 rounded-xl text-xs font-bold uppercase">Update Lokasi</button>
                    </div>
                </div>
                <div class="glass p-6 rounded-3xl overflow-auto max-h-64">
                    <h3 class="text-sky-400 font-bold text-sm mb-4"><i class="fas fa-clock mr-2"></i>JADWAL HARI INI</h3>
                    <div id="contJ" class="text-[10px] space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzpAMRBe7MPI0AGKO_qDSY2GSx3-Q8YXB8hgrNNp-dUDIKUIeieSRBQju9Xkvip_vTZhw/exec";
        let SISWA = [], pos = null, conf = null;

        function showMsg(t){ const b=document.getElementById('toast'); b.innerText=t; b.classList.remove('hidden'); setTimeout(()=>b.classList.add('hidden'),3000); }

        async function login(){
            const u = document.getElementById('u').value, p = document.getElementById('pin').value;
            const btn = document.getElementById('btnLogin');
            btn.innerText = "AUTHENTICATING...";
            try {
                const res = await fetch(`${API}?mode=get_users`);
                const users = await res.json();
                const user = users.find(x => x.username.toLowerCase() == u.toLowerCase() && x.pin == p);
                if(user) {
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('roleLabel').innerText = user.role;
                    if(user.role.toUpperCase() === "ADMIN") { 
                        document.getElementById('vAdmin').classList.remove('hidden'); 
                        loadAdminData(); 
                    } else { 
                        document.getElementById('vPetugas').classList.remove('hidden'); 
                        startCam(); loadSiswa(); startGPS(); 
                    }
                } else { alert("User/PIN Salah!"); btn.innerText = "MASUK"; }
            } catch(e) { alert("Koneksi Gagal!"); btn.innerText = "MASUK"; }
        }

        async function startCam(){ document.getElementById('v').srcObject = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}); }
        
        async function loadSiswa(){
            const res = await fetch(`${API}?mode=get_siswa`);
            SISWA = await res.json();
            const dl = document.getElementById('lS');
            SISWA.forEach(s => { let o = document.createElement('option'); o.value = s.nama; dl.appendChild(o); });
        }

        function startGPS(){
            fetch(`${API}?mode=get_config`).then(r=>r.json()).then(c=>{
                conf = {lat: c[0], lng: c[1], rad: c[2]};
                navigator.geolocation.watchPosition(p=>{
                    pos = p.coords;
                    const d = Math.round(calcD(p.coords.latitude, p.coords.longitude, conf.lat, conf.lng));
                    document.getElementById('distLabel').innerText = d + "m";
                    document.getElementById('gpsStatus').firstElementChild.className = d <= conf.rad ? "w-2 h-2 rounded-full bg-green-500" : "w-2 h-2 rounded-full bg-red-500";
                    const btn = document.getElementById('btnA');
                    if(d > conf.rad) { btn.disabled = true; btn.innerText = "DILUAR RADIUS"; }
                    else { btn.innerText = "ABSEN SEKARANG"; cekS(document.getElementById('cariS').value); }
                }, null, {enableHighAccuracy:true});
            });
        }

        function calcD(la1, lo1, la2, lo2) {
            const R = 6371000, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function cekS(v){ const s = SISWA.find(x=>x.nama===v); document.getElementById('bK').innerText = s ? `KELAS: ${s.kelas}` : "KELAS: -"; document.getElementById('btnA').disabled = !s; }

        async function absen(){
            const s = SISWA.find(x=>x.nama===document.getElementById('cariS').value);
            const btn = document.getElementById('btnA'); btn.innerText = "KIRIM..."; btn.disabled = true;
            const canvas = document.createElement('canvas'); canvas.width=400; canvas.height=400;
            canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 400, 400);
            try {
                const res = await fetch(API, {method:'POST', body:JSON.stringify({action:"absen", nama:s.nama, kelas:s.kelas, lat:pos.latitude, lng:pos.longitude, foto:canvas.toDataURL('image/jpeg', 0.5)})});
                showMsg("BERHASIL: " + await res.text());
                document.getElementById('cariS').value = ""; cekS("");
            } catch(e){ showMsg("Gagal Terkirim!"); }
            btn.innerText = "ABSEN SEKARANG";
        }

        async function loadAdminData(){
            const [cR, sR] = await Promise.all([fetch(`${API}?mode=get_config`), fetch(`${API}?mode=get_settings`)]);
            const config = await cR.json(), sets = await sR.json();
            document.getElementById('cLat').value = config[0];
            document.getElementById('cLng').value = config[1];
            document.getElementById('cRad').value = config[2];
            let html = ""; sets.forEach(r => html += `<div class="flex justify-between border-b border-white/5 py-1"><span>${r[0]}</span><span class="text-sky-400">${r[1]}-${r[2]}</span></div>`);
            document.getElementById('contJ').innerHTML = html;
        }

        async function saveConfig(){
            const body = { action:"update_config", lat:document.getElementById('cLat').value, lng:document.getElementById('cLng').value, radius:document.getElementById('cRad').value };
            await fetch(API, {method:'POST', body:JSON.stringify(body)});
            showMsg("LOKASI DIPERBARUI!");
        }
    </script>
</body>
</html>
